<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .card { 
            background: #121212; 
            border: 1px solid #222; 
            transition: all 0.2s;
        }
        /* Glow effect like the screenshot */
        .card:hover { border-color: #a855f7; box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }
        .filter-btn.active { background-color: #a855f7; border-color: #a855f7; }
    </style>
</head>
<body class="p-4">

    <header class="text-center mb-6">
        <h1 class="text-2xl font-bold mb-4">My List! 🍟</h1>
        
        <div class="flex gap-2 justify-start overflow-x-auto pb-4 no-scrollbar" id="filter-container">
            <button class="filter-btn active whitespace-nowrap px-4 py-1 rounded-full border border-gray-700 text-sm" onclick="filterSelection('all', this)">All</button>
            <button class="filter-btn whitespace-nowrap px-4 py-1 rounded-full border border-gray-700 text-sm" onclick="filterSelection('popular', this)">Popular</button>
            <button class="filter-btn whitespace-nowrap px-4 py-1 rounded-full border border-gray-700 text-sm" onclick="filterSelection('tools', this)">Tools</button>
            <button class="filter-btn whitespace-nowrap px-4 py-1 rounded-full border border-gray-700 text-sm" onclick="filterSelection('media', this)">Media</button>
            <button class="filter-btn whitespace-nowrap px-4 py-1 rounded-full border border-gray-700 text-sm" onclick="filterSelection('bank', this)">Bank</button>
            <button class="filter-btn whitespace-nowrap px-4 py-1 rounded-full border border-gray-700 text-sm" onclick="filterSelection('sim', this)">SIM</button>
            <button class="filter-btn whitespace-nowrap px-4 py-1 rounded-full border border-gray-700 text-sm" onclick="filterSelection('official', this)">Official</button>
        </div>
    </header>

    <div class="grid grid-cols-2 gap-3" id="links-grid">
        <div class="card p-5 rounded-xl text-center" data-category="media">
            <span class="block font-medium">1Shows</span>
        </div>
        <div class="card p-5 rounded-xl text-center" data-category="media">
            <span class="block font-medium">AniWatch</span>
        </div>
        <div class="card p-5 rounded-xl text-center" data-category="bank">
            <span class="block font-medium">bKash</span>
        </div>
        <div class="card p-5 rounded-xl text-center" data-category="sim">
            <span class="block font-medium">MyGP</span>
        </div>
        <div class="card p-5 rounded-xl text-center" data-category="popular">
            <span class="block font-medium">Facebook</span>
        </div>
    </div>

    <script>
        function filterSelection(category, btn) {
            const cards = document.querySelectorAll('.card');
            const buttons = document.querySelectorAll('.filter-btn');

            // Update button UI
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Filter logic
            cards.forEach(card => {
                if (category === 'all') {
                    card.classList.remove('hidden');
                } else {
                    if (card.getAttribute('data-category') === category) {
                        card.classList.remove('hidden');
                    } else {
                        card.classList.add('hidden');
                    }
                }
            });
        }
    </script>
</body>
</html>
